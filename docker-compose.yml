version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadconnect-app
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
      - meilisearch

  nginx:
    image: nginx:1.27-alpine
    container_name: leadconnect-nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: leadconnect-mysql
    environment:
      MYSQL_DATABASE: leadconnect
      MYSQL_USER: leadconnect
      MYSQL_PASSWORD: leadconnect
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: leadconnect-redis
    ports:
      - "6380:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: leadconnect-meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan horizon
    volumes:
      - ./:/var/www/html
    depends_on:
      - redis

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      - redis

volumes:
  mysql_data:
